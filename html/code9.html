<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>

<body>
    <form>
        <fieldset>
            <legend>Personal info</legend>
            <label>Enter your first name : </label>
            <input type="text"> <br> <br>

            <label>Enter your last name : </label>
            <input type="text"><br> <br>


            <label>Enter your contact : </label>
            <input type="number"><br> <br>
            <label>Enter your password : </label>
            <input type="password"><br> <br>

            <label>Enter your email : </label>
            <input type="email"><br> <br>


            <label>Enter your DOB : </label>
            <input type="date"><br> <br>

            <label>Gender: </label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender">Female<br> <br>
        </fieldset>




        <label>Skills: </label>
        <input type="checkbox"> HTML
        <input type="checkbox">CSS
        <input type="checkbox">Tailwind
        <input type="checkbox">Bootstrap
        <input type="checkbox">JS
        <input type="checkbox">React
        <input type="checkbox">Node.js
        <input type="checkbox">Express
        <input type="checkbox">Express

        <br> <br>

        <fieldset>
            <input type="file">
            <input type="text">
            <input type="search">
            <input type="color">
            <input type="range">
        </fieldset>



        <fieldset>
            <input type="text" placeholder="Enter your name ">
            <input type="text" placeholder="Ganesh Dutt ">
            <input type="text" value="Ganesh Dutt " readonly>
            <input type="text" value="Ganesh Dutt " disabled>

            <input type="text" size="5">
            <input type="number" min="10" max="20">
        </fieldset>

        <fieldset>
            <textarea rows="10" cols="10"></textarea>

            <select name="">
                <option value="city">Mathura</option>
                <option value="city">Delhi</option>
                <option value="city">Noida</option>
            </select>
        </fieldset>
        <input type="submit" value="submit">

    </form>


</body>

</html>
