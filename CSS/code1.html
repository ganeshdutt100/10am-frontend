<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin and padding </title>
    <style>
        * {
            margin: 0;
        }

        h1 {
            width: 200px;
            height: 200px;
            color: yellow;
            background-color: black;

            margin: 10px;
            margin-left: 10px;
            margin-top: 20px;
            margin-right: 40px;
            margin-bottom: 80px;

            margin: 20px 30px;
            margin: 20px 40px 10px;
            margin: 20px 40px 10px 50px;


            padding: 100px;
            padding: 10px 40px;
            padding: 10px 20px 40px;
            padding: 10px 20px 40px 50px;

            padding-top: 30px;
            padding-right: 90px;
            padding-bottom: 30px;
            padding-left: 30px;


            border: 10px solid green;

            /* border-width: 20px;
            border-top-width: 10px;
            border-left-width: 5px;
            border-right-width: 5px;
            border-bottom-width: 5px; */


            /* border-style: solid;
            border-style: dotted;
            border-style: double;
            border-top-style: solid; */

            /* border-color: green;
            border-top-color: red; */

            border-radius: 10px;
            border-top-left-radius: 100px;
            border-top-right-radius: 100px;
            border-bottom-right-radius: 100px;
            border-bottom-left-radius: 100px;

            border-radius: 50%;
            /* border-radius: none; */
            /* border: none; */
        }

        input {
            outline: none;
            outline: 2px solid green;
        }
    </style>
</head>

<body>
    <h1>Lorem, ipsum.</h1>
    <input type="text">
</body>

</html>
