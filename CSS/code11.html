<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* phone screen  */
        /* h1 {

            background-color: yellow;
        } */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        nav {
            background-color: black;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
        }

        ul {
            display: none;
            gap: 20px;
            list-style: none;
        }


        /* laptop screen   */
        @media (min-width: 500px) {
            h1 {
                background-color: lightblue;

            }

            ul {
                display: flex;
            }

            .bar {
                display: none;
            }

        }

        /* 

        @media (min-width: 700px) {
            h1 {
                background-color: lightgreen;

            }

        }

        */
    </style>
</head>

<body>
    <nav>
        <div class="logo">My Logo</div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
        <div class="bar">
            ⏸️
        </div>
    </nav>
</body>

</html>
