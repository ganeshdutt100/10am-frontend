<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-1 {
            width: 400px;
            background-color: lightgreen;
            border: 2px solid green;
            padding: 20px;
        }

        .box-2 {
            margin-top: 10px;
            max-width: 400px;
            background-color: lightcoral;
            border: 2px solid rgb(247, 95, 95);
            padding: 20px;
        }

        .box-3 {
            margin-top: 10px;
            min-width: 400px;
            background-color: lightseagreen;
            border: 2px solid rgb(2, 62, 88);
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="box box-1">Lorem ipsum dolor sit amet.
    </div>
    <div class="box box-2">Lorem ipsum dolor sit amet.
    </div>
    <div class="box box-3">Lorem ipsum dolor sit amet.
    </div>
</body>

</html>
