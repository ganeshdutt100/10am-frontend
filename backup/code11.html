<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cardHeading {
            text-align: center;
            font-family: sans-serif;
            font-size: 40px;
            text-shadow: 5px 5px 5px rgb(231, 43, 43);
        }

        .card {
            width: 300px;
            height: auto;
            padding-bottom: 20px;
            background-color: lightblue;
            position: relative;
            font-family: sans-serif;
            transition: all .2s linear;

            /* box-shadow: inset 24px 15px 37px 4px rgba(0, 0, 0, 0.71); */


        }

        .card:hover {
            box-shadow: 5px 15px 37px 4px rgba(0, 0, 0, 0.326);
        }


        .card img {
            width: 100%;
            height: 300px;
        }

        .card .number {
            background-color: lightblue;
            width: 25px;
            height: 25px;
            padding: 20px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            position: absolute;
            left: 35%;
            top: 50%;

        }

        .card .text {
            padding-top: 40px;
        }
    </style>
</head>

<body>
    <h1 class="cardHeading">Card</h1>
    <div class="card">
        <img src="https://plus.unsplash.com/premium_photo-1720287601920-ee8c503af775?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8Y29kaW5nfGVufDB8fDB8fHww"
            alt="">
        <p class="number"> 10</p>
        <p class="text">
            Lorem ipsum dolor, sit amet consectetur adipisicing elit. Iure expedita sunt asperiores ratione architecto
            doloribus magnam id, velit voluptate iusto officia eum neque ea enim odio incidunt esse quo modi!
        </p>
    </div>
</body>

</html>
